services:
  redis:
    image: redis:7.4-alpine
    container_name: simplenote-redis
    restart: unless-stopped
    ports:
      - "6600:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - simplenote-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  simplenote-redis-data:
