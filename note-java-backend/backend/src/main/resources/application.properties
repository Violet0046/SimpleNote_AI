# 服务器配置
server.port=8080
server.servlet.context-path=/

# 日志配置
logging.level.com.simplenote.backend=DEBUG
logging.level.org.springframework.web=DEBUG

# 跨域配置已通过Java代码实现

# ================= 数据库连接配置 =================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.url=jdbc:mysql://localhost:3306/simplenote_db?serverTimezone=Asia/Shanghai&characterEncoding=utf8&useSSL=false
spring.datasource.username=root
spring.datasource.password=1234

# ================= MyBatis 配置 =================
# 开启驼峰命名自动映射 (比如把数据库的 create_time 自动映射为 Java 里的 createTime)
mybatis.configuration.map-underscore-to-camel-case=true
# 在控制台打印执行的 SQL 语句，极其方便查 Bug！
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl