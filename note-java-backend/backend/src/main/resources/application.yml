server:
  port: 8080
  servlet:
    context-path: /

spring:
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:simplenote_db}?serverTimezone=Asia/Shanghai&characterEncoding=utf8&useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6600}
      database: ${REDIS_DATABASE:0}
      timeout: 2s

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

mybatis:
  configuration:
    map-underscore-to-camel-case: true

logging:
  charset:
    console: UTF-8
    file: UTF-8
  level:
    "[com.simplenote.backend]": INFO
    "[org.springframework.web]": WARN
    "[org.springframework.data.redis]": WARN
    "[org.springframework.web.servlet.mvc.method.annotation.SseEmitter]": WARN
    root: INFO

file:
  upload-dir: uploads/

cache:
  post:
    detail-ttl: 30m
    null-ttl: 5m

social:
  sync:
    fixed-delay-ms: 10000

agent:
  knowledge:
    min-post-id: 24
    max-post-id: 60
    max-posts: 40
    max-comments-per-post: 2
    max-content-length: 360
    max-comment-length: 120
