server:
  port: 8080
  servlet:
    context-path: /

spring:
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
      
  # ================= 从 properties 迁移过来的数据库配置 =================
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/simplenote_db?serverTimezone=Asia/Shanghai&characterEncoding=utf8&useSSL=false
    username: root
    password: 1234
    
  # ================= 新增：打破体型封印，允许上传大图 =================
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

# =================  MyBatis 配置 =================
mybatis:
  configuration:
    # 开启驼峰命名自动映射
    map-underscore-to-camel-case: true
    # 在控制台打印执行的 SQL 语句
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  charset:
    console: UTF-8
    file: UTF-8
  level:
    "[com.simplenote.backend]": TRACE
    "[org.springframework.web]": DEBUG
    root: INFO
    "[org.springframework.web.servlet.mvc.method.annotation.SseEmitter]": TRACE

file:
  # 这里写死你想存放图片的绝对路径（注意最后的 / 不能丢）
  upload-dir: D:/VS/26project/SimpleNote_AI/note-java-backend/backend/uploads/